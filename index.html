<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omibaina</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f4f4; 
            --text-color: #000000;
            --pixel-border: 4px solid #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* === TELA PRINCIPAL === */
        .container {
            width: 100%;
            max-width: 380px; 
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
        }

        .main-title {
            font-size: 28px;
            margin-top: 10px;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }

        .month-title {
            font-size: 16px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            column-gap: 0px; 
            row-gap: 15px; 
            width: 100%;
            margin-bottom: 0px; 
        }

        .shell-slot {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            position: relative; 
            overflow: visible;
        }

        .shell-slot.filled {
            filter: drop-shadow(1px 1px 0px rgba(0,0,0,0.8));
        }

        .percentage {
            font-size: 25px; 
            margin-top: 20px; 
            margin-bottom: 8px; 
        }

        .participation-text {
            font-size: 10px; 
            text-transform: uppercase;
            margin-bottom: 0px; 
            color: var(--text-color);
        }

        .bottom-actions {
            margin-top: auto; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px; 
        }

        .pix-row {
            display: flex;
            flex-direction: row;
            gap: 10px;
            width: 100%;
        }

        .pix-field {
            background-color: #a9a9a9; 
            border: var(--pixel-border);
            padding: 12px;
            flex-grow: 1; 
            text-align: center;
            font-size: 9px; 
            word-break: break-all;
            box-shadow: 4px 4px 0px #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pixel-btn {
            border: var(--pixel-border);
            color: var(--text-color);
            font-family: 'Press Start 2P', cursive;
            padding: 12px 15px;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            box-shadow: 4px 4px 0px #000;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pixel-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #000;
        }

        .btn-copy {
            background-color: #a9a9a9; 
            white-space: nowrap; 
        }

        .btn-submit {
            background-color: #4CAF50; 
            color: white;
            width: 100%;
        }

        /* === SEGUNDA TELA (A BRINCADEIRA) === */
        .reaction-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 15px 20px 15px; 
            gap: 15px;
        }

        #reaction-img {
            height: 250px; 
            width: auto; 
            max-width: 100%; 
            object-fit: contain; 
            transition: opacity 0.2s;
        }

        .reaction-buttons {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            width: 100%;
            gap: 10px;
        }

        .pixel-btn.btn-yes {
            background-color: #4CAF50; 
            color: white;
            flex-grow: 1;
            padding: 15px 10px; 
        }

        .pixel-btn.btn-no {
            background-color: #d32f2f; 
            color: white;
            flex-grow: 1;
            padding: 15px 10px;
        }

        /* === EASTER EGG: LINK FOFOQUEIRO === */
        .gossip-link {
            font-size: 10px;
            color: #888888;
            margin-top: 100vh; 
            margin-bottom: 40px;
            text-decoration: underline;
            cursor: pointer;
            text-transform: uppercase;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.75);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background-color: #ffffff;
            border: var(--pixel-border);
            padding: 30px 20px;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            box-shadow: 8px 8px 0px #000;
        }

        .modal-text {
            font-size: 18px;
            text-align: center;
            line-height: 1.5;
            color: #d32f2f; 
        }

        @media (max-width: 320px) {
            .shell-slot { font-size: 14px; }
            .main-title { font-size: 22px; }
            .month-title { font-size: 14px; }
            .percentage { font-size: 22px; }
            .participation-text { font-size: 8px; }
            .pix-field { font-size: 7px; padding: 10px; }
            .pixel-btn { font-size: 9px; padding: 10px; }
            .modal-text { font-size: 14px; }
            #reaction-img { height: 200px; }
        }
    </style>
</head>
<body>

    <audio id="audio-happy" src="https://github.com/pedrohecht/omibaina/blob/51e47cce30a2a2f15761336050e267f3d091a1f2/arrasoubonita-crop.mp3?raw=true" preload="auto"></audio>
    <audio id="audio-sad" src="https://github.com/pedrohecht/omibaina/blob/1ddbdcd291f933b0b4ddfc966463b3c7e2b185da/paguemeudinheiro.mp3?raw=true" preload="auto"></audio>

    <div class="container">
        <h1 class="main-title">OMIBAINA</h1>
        <h2 class="month-title" id="month-display">MÊS</h2>

        <div class="grid-container" id="shell-grid"></div>
        
        <h2 class="percentage" id="percentage-display">0%</h2>
        <p class="participation-text">de participação</p>

        <div class="bottom-actions">
            <div class="pix-row">
                <div class="pix-field" id="pix-key">omibainafinanceiro@gmail.com</div>
                <button class="pixel-btn btn-copy" onclick="copyPix()">COPIAR</button>
            </div>

            <a href="https://forms.gle/1pMudhhBxVU7JVZJ6" class="pixel-btn btn-submit">ENVIAR COMPROVANTE</a>
        </div>
    </div>

    <div class="reaction-container">
        <img id="reaction-img" src="https://github.com/pedrohecht/omibaina/blob/main/s%C3%A9ria-removebg-preview.png?raw=true" alt="Humor">
        <div class="reaction-buttons">
            <button class="pixel-btn btn-yes" onclick="changeReaction('happy')">CONTRIBUÍ</button>
            <button class="pixel-btn btn-no" onclick="changeReaction('sad')">NÃO CONTRIBUÍ</button>
        </div>
    </div>

    <a class="gossip-link" onclick="openModal()">ver devedores</a>

    <div class="modal-overlay" id="gossip-modal">
        <div class="modal-box">
            <p class="modal-text">FOFOQUEIRA!</p>
            <button class="pixel-btn btn-copy" onclick="closeModal()">FECHAR</button>
        </div>
    </div>

    <script>
        // === CONFIGURAÇÃO DA PORCENTAGEM ===
        const currentPercentage = 15; 
        
        const monthDisplay = document.getElementById('month-display');
        const grid = document.getElementById('shell-grid');
        const percentageDisplay = document.getElementById('percentage-display');

        const months = ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];
        const currentMonthIndex = new Date().getMonth();
        monthDisplay.innerText = months[currentMonthIndex];

        percentageDisplay.innerText = currentPercentage + '%';

        // Renderizar Búzios
        for (let i = 0; i < currentPercentage; i++) {
            const slot = document.createElement('div');
            slot.className = 'shell-slot filled'; 
            slot.innerHTML = '<img src="https://github.com/pedrohecht/horario-f1/blob/main/Gemini_Generated_Image_a2e8m9a2e8m9a2e8-removebg-preview.png?raw=true" alt="buzio" style="position: absolute; width: 150%; height: 150%; object-fit: contain; transform: rotate(90deg);">';
            grid.appendChild(slot);
        }

        // Função Pix
        function copyPix() {
            const pixKey = document.getElementById('pix-key').innerText;
            navigator.clipboard.writeText(pixKey).then(() => {
                alert('Chave PIX copiada com sucesso!');
            }).catch(err => {
                console.error('Erro ao copiar: ', err);
                alert('Erro ao copiar chave PIX.');
            });
        }

        // === LÓGICA DAS IMAGENS E ÁUDIO ===
        let reactionTimeout; 
        const imgSeriaUrl = 'https://github.com/pedrohecht/omibaina/blob/main/s%C3%A9ria-removebg-preview.png?raw=true';
        const imgSorrindoUrl = 'https://github.com/pedrohecht/omibaina/blob/main/sorrindo-removebg-preview.png?raw=true';
        const imgTristeUrl = 'https://github.com/pedrohecht/omibaina/blob/main/chorando-removebg-preview.png?raw=true';
        
        // Elementos de Áudio que criamos no HTML
        const audioHappy = document.getElementById('audio-happy');
        const audioSad = document.getElementById('audio-sad');

        // Preload das imagens
        const preloadHappy = new Image();
        preloadHappy.src = imgSorrindoUrl;
        const preloadSad = new Image();
        preloadSad.src = imgTristeUrl;

        function changeReaction(mood) {
            const imgElement = document.getElementById('reaction-img');
            clearTimeout(reactionTimeout);

            if (mood === 'happy') {
                imgElement.src = imgSorrindoUrl;
                
                // Pausa o triste se estiver tocando
                audioSad.pause();
                audioSad.currentTime = 0;
                
                // Toca o feliz
                audioHappy.currentTime = 0; 
                audioHappy.play().catch(e => console.log("Áudio bloqueado pelo navegador", e));
                
            } else if (mood === 'sad') {
                imgElement.src = imgTristeUrl;
                
                // Pausa o feliz se estiver tocando
                audioHappy.pause();
                audioHappy.currentTime = 0;
                
                // Toca o triste
                audioSad.currentTime = 0;
                audioSad.play().catch(e => console.log("Áudio bloqueado pelo navegador", e));
            }

            // Conta 3 segundos e volta ao rosto sério
            reactionTimeout = setTimeout(() => {
                imgElement.src = imgSeriaUrl;
            }, 3000);
        }

        // Modal Fofoqueira
        function openModal() {
            document.getElementById('gossip-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('gossip-modal').style.display = 'none';
        }
    </script>
</body>
</html>
